<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odysseia Guidance</title>
    <meta
      name="description"
      content="轻量级 VPS 服务导航起始页，支持密码验证与自定义链接。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell" aria-hidden="true">
      <div class="ambient ambient-a"></div>
      <div class="ambient ambient-b"></div>
      <div class="grid-glow"></div>
    </div>

    <main class="app">
      <header class="hero">
        <div class="hero-copy">
          <span class="eyebrow">Private Gateway</span>
          <h1>VPS 服务导航</h1>
          <p>
            统一收纳常用服务入口，解锁后即可快速跳转到你的面板、监控、下载和管理工具。
          </p>
        </div>

        <button
          id="openCreateButton"
          class="create-button hidden"
          type="button"
          aria-haspopup="dialog"
          aria-controls="createModal"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M3 17.25V21h3.75L18.81 8.94l-3.75-3.75L3 17.25Zm17.71-10.04a1.003 1.003 0 0 0 0-1.42l-2.5-2.5a1.003 1.003 0 0 0-1.42 0l-1.96 1.96 3.75 3.75 2.13-2.79Z"
            />
          </svg>
          <span>新建</span>
        </button>
      </header>

      <section class="panel summary-panel">
        <div>
          <p class="panel-label">导航状态</p>
          <h2 id="statusTitle">等待验证</h2>
        </div>
        <p id="statusText" class="muted">
          输入密码后加载服务列表。支持记住登录状态。
        </p>
      </section>

      <section class="services-section">
        <div class="section-header">
          <div>
            <p class="panel-label">Services</p>
            <h2>快捷入口</h2>
          </div>
        </div>

        <div id="serviceGrid" class="service-grid hidden"></div>
        <div id="emptyState" class="panel empty-state hidden">
          <h3>还没有导航项</h3>
          <p>点击右上角“新建”，把你的服务地址加进来。</p>
        </div>
      </section>
    </main>

    <div
      id="authOverlay"
      class="overlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="authTitle"
    >
      <div class="modal glass-modal auth-modal">
        <div class="modal-head">
          <span class="panel-label">访问验证</span>
          <h2 id="authTitle">请输入访问密码</h2>
          <p>只有验证成功后，导航内容才会从服务端加载出来。</p>
        </div>

        <form id="authForm" class="stack-form">
          <label class="field">
            <span>密码</span>
            <input
              id="passwordInput"
              name="password"
              type="password"
              placeholder="请输入访问密码"
              autocomplete="current-password"
              required
            />
          </label>

          <label class="checkbox-field">
            <input id="rememberInput" name="remember" type="checkbox" />
            <span>记住密码</span>
          </label>

          <p id="authError" class="form-error hidden" aria-live="polite">
            密码错误，请重试
          </p>

          <button id="authSubmit" class="primary-button" type="submit">
            进入主页
          </button>
        </form>
      </div>
    </div>

    <div
      id="createModal"
      class="overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="createTitle"
    >
      <div class="modal glass-modal">
        <div class="modal-head">
          <div>
            <span class="panel-label">新建导航项</span>
            <h2 id="createTitle">添加新的服务链接</h2>
          </div>
          <button id="closeCreateButton" class="icon-button" type="button" aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M18.3 5.71 12 12l6.3 6.29-1.41 1.41L10.59 13.4 4.29 19.7 2.88 18.29 9.17 12 2.88 5.71 4.29 4.3l6.3 6.29 6.29-6.3Z"
              />
            </svg>
          </button>
        </div>

        <form id="createForm" class="stack-form">
          <label class="field">
            <span>名称</span>
            <input name="name" type="text" maxlength="40" placeholder="例如：Grafana" required />
          </label>

          <label class="field">
            <span>网址</span>
            <input
              name="url"
              type="url"
              placeholder="https://service.example.com"
              required
            />
          </label>

          <label class="field">
            <span>描述</span>
            <textarea
              name="description"
              rows="3"
              maxlength="90"
              placeholder="一句话说明这个服务是做什么的"
            ></textarea>
          </label>

          <label class="field">
            <span>图标上传</span>
            <input id="iconInput" name="icon" type="file" accept="image/*" />
          </label>

          <div class="icon-preview-row">
            <div id="iconPreview" class="icon-preview">图标预览</div>
            <p class="muted">图片会自动压缩成小尺寸，便于直接保存到 KV。</p>
          </div>

          <p id="createError" class="form-error hidden" aria-live="polite"></p>

          <button id="createSubmit" class="primary-button" type="submit">
            添加到主页
          </button>
        </form>
      </div>
    </div>

    <template id="serviceCardTemplate">
      <a class="service-card panel" target="_blank" rel="noreferrer noopener">
        <div class="service-icon-wrap">
          <div class="service-icon-fallback"></div>
          <img class="service-icon-image hidden" alt="" />
        </div>
        <div class="service-meta">
          <h3></h3>
          <p></p>
        </div>
        <span class="card-arrow" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path
              d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42 9.3-9.29H14V3ZM5 5h6v2H7v10h10v-4h2v6H5V5Z"
            />
          </svg>
        </span>
      </a>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
