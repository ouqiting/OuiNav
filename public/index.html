<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OuiNav</title>
    <meta
      name="description"
      content="轻量级 VPS 服务导航起始页，支持密码验证与自定义链接。"
    />
    <link rel="icon" href="./assets/bookmarks-fill.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar hidden" id="topbar">
        <div class="topbar-actions">
          <button id="themeToggleButton" class="toolbar-button" type="button" aria-label="切换浅色或深色模式">
            <img id="themeIconSun" src="./assets/brightness-high.svg" alt="" aria-hidden="true" />
            <img id="themeIconMoon" class="hidden" src="./assets/moon.svg" alt="" aria-hidden="true" />
          </button>
          <button id="logoutButton" class="toolbar-button" type="button" aria-label="退出登录">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M15 16l4-4-4-4"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.7"
              />
              <path
                d="M19 12H9"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-width="1.7"
              />
              <path
                d="M10 5H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h4"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.7"
              />
            </svg>
          </button>
        </div>
        <div class="topbar-divider" aria-hidden="true"></div>
        <div class="topbar-create-row">
          <button
            id="openCreateButton"
            class="create-button hidden"
            type="button"
            aria-haspopup="dialog"
            aria-controls="createModal"
            aria-label="新建导航项"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M3 17.25V21h3.75L18.81 8.94l-3.75-3.75L3 17.25Zm17.71-10.04a1.003 1.003 0 0 0 0-1.42l-2.5-2.5a1.003 1.003 0 0 0-1.42 0l-1.96 1.96 3.75 3.75 2.13-2.79Z"
              />
            </svg>
          </button>
        </div>
      </header>

      <section class="services-section">
        <div id="serviceGrid" class="service-grid hidden"></div>
        <div id="emptyState" class="empty-state hidden">
          <p>暂无导航项</p>
        </div>
      </section>
    </main>

    <div
      id="authOverlay"
      class="overlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="authTitle"
    >
      <div class="auth-shell">
        <div class="modal auth-modal">
          <div class="auth-heading">
            <h2 id="authTitle">OuiNav</h2>
            <p>请输入连接信息以访问管理界面</p>
          </div>

          <form id="authForm" class="stack-form">
            <label class="field centered-field">
              <span>管理密钥:</span>
              <div class="password-input-wrap">
                <input
                  id="passwordInput"
                  name="password"
                  type="password"
                  placeholder="请输入管理密钥"
                  autocomplete="current-password"
                  required
                />
                <button
                  id="togglePasswordButton"
                  class="password-toggle"
                  type="button"
                  aria-label="显示或隐藏密码"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      d="M12 5c5.23 0 9.27 3.11 10.75 7-1.48 3.89-5.52 7-10.75 7S2.73 15.89 1.25 12C2.73 8.11 6.77 5 12 5Zm0 2C8.2 7 5.17 9.12 3.51 12 5.17 14.88 8.2 17 12 17s6.83-2.12 8.49-5C18.83 9.12 15.8 7 12 7Zm0 2.5A2.5 2.5 0 1 1 12 14.5a2.5 2.5 0 0 1 0-5Z"
                    />
                  </svg>
                </button>
              </div>
            </label>

            <label class="checkbox-field">
              <input id="rememberInput" name="remember" type="checkbox" />
              <span>记住密码</span>
            </label>

            <p id="authError" class="form-error hidden" aria-live="polite">
              密码错误，请重试
            </p>

            <button id="authSubmit" class="primary-button" type="submit">
              登录
            </button>
          </form>
        </div>
      </div>
    </div>

    <div
      id="createModal"
      class="overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="createTitle"
    >
      <div class="modal create-modal">
        <div class="modal-head">
          <div>
            <h2 id="createTitle">添加新的服务链接</h2>
          </div>
          <button id="closeCreateButton" class="icon-button" type="button" aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M18.3 5.71 12 12l6.3 6.29-1.41 1.41L10.59 13.4 4.29 19.7 2.88 18.29 9.17 12 2.88 5.71 4.29 4.3l6.3 6.29 6.29-6.3Z"
              />
            </svg>
          </button>
        </div>

        <form id="createForm" class="stack-form">
          <input id="editingIdInput" name="editingId" type="hidden" />

          <label class="field">
            <span>名称</span>
            <input name="name" type="text" maxlength="40" placeholder="例如：Grafana" required />
          </label>

          <label class="field">
            <span>网址</span>
            <input
              name="url"
              type="url"
              placeholder="https://service.example.com"
              required
            />
          </label>

          <label class="field">
            <span>描述</span>
            <textarea
              name="description"
              rows="3"
              maxlength="90"
              placeholder="一句话说明这个服务是做什么的"
            ></textarea>
          </label>

          <label class="field">
            <span>图标上传</span>
            <input id="iconInput" name="icon" type="file" accept="image/*,.svg" />
          </label>

          <div class="icon-preview-row">
            <div id="iconPreview" class="icon-preview">图标预览</div>
            <p class="muted">图片会自动压缩成小尺寸，便于直接保存到 KV。</p>
          </div>

          <p id="createError" class="form-error hidden" aria-live="polite"></p>

          <button id="createSubmit" class="primary-button" type="submit">
            添加到主页
          </button>
        </form>
      </div>
    </div>

    <template id="serviceCardTemplate">
      <article class="service-card">
        <button class="drag-handle" type="button" aria-label="长按拖动排序">
          <img src="./assets/justify.svg" alt="" aria-hidden="true" />
        </button>
        <div class="service-index"></div>
        <a class="service-main" target="_blank" rel="noreferrer noopener">
          <div class="service-meta">
            <h3>
              <span class="service-inline-icon hidden">
                <img class="service-inline-icon-image" alt="" />
              </span>
              <span class="service-title-text"></span>
            </h3>
            <p></p>
          </div>
        </a>
        <div class="service-actions">
          <button class="action-button edit-button" type="button">编辑</button>
          <button class="action-button delete-button" type="button">删除</button>
        </div>
        <span class="card-arrow" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path
              d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42 9.3-9.29H14V3ZM5 5h6v2H7v10h10v-4h2v6H5V5Z"
            />
          </svg>
        </span>
      </article>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
